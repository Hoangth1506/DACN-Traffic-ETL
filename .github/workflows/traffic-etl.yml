name: Traffic ETL Raw Collection

on:
  workflow_dispatch:
    inputs:
      measurement_label:
        description: "Measurement label, e.g. morning_06_27, noon_11_30, afternoon_17_15"
        required: true
        type: string

concurrency:
  group: traffic-etl-raw-collection
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Collect raw TomTom and OSM data
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        run: python run_raw_measurement.py --measurement-label "${{ inputs.measurement_label }}"

      - name: Commit raw measurement outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase --autostash origin main

          git add -f outputs/raw_measurements

          if git diff --cached --quiet; then
            echo "No output changes to commit"
          else
            git commit -m "Collect raw traffic measurement: ${{ inputs.measurement_label }}"
            git push origin main
          fi
