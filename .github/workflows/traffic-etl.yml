name: Traffic ETL Scheduled Collection

on:
  workflow_dispatch:
  schedule:
    # Vietnam time (UTC+7):
    # 06:00-08:00 -> 23:00-01:00 UTC
    # 11:00-13:00 -> 04:00-06:00 UTC
    # 16:00-19:00 -> 09:00-12:00 UTC
    - cron: "*/10 23,0,1,4,5,6,9,10,11,12 * * *"

concurrency:
  group: traffic-etl-collection
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run ETL inside configured Vietnam-time windows
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        run: python run_etl.py --respect-windows

      - name: Commit collected outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase --autostash origin main

          git add -f outputs

          if git diff --cached --quiet; then
            echo "No output changes to commit"
          else
            git commit -m "Collect traffic ETL snapshot"
            git push origin main
          fi
