name: Continuous 24/7 Realtime Traffic ETL & Dashboard Build

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-etl-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pyarrow requests pyyaml scipy scikit-learn

      - name: Run Real-Time Raw Measurement Collection
        run: |
          python run_raw_measurement.py --measurement-label github_cron_live

      - name: Run ETL Data Generation
        run: |
          python generate_data.py

      - name: Export Public JSON Files
        run: |
          python export_json.py

      - name: Setup Node.js & Build Vite Dashboard
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install & Build Dashboard
        run: |
          cd dashboard
          npm install --legacy-peer-deps
          npm run build

      - name: Commit and Push Updated Data to GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: continuous real-time traffic data update [skip ci]"
          file_pattern: "dashboard/public/*.json dashboard/dist/* outputs/*.parquet outputs/*.json outputs/raw_measurements/**"
