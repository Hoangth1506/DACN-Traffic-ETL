name: Continuous 24/7 Realtime Traffic ETL & Dashboard Build

on:
  schedule:
    - cron: '*/5 * * * *' # Minimum reliable interval supported by GitHub Actions (every 5 minutes)
  workflow_dispatch: # Allows manual trigger from GitHub UI anytime

jobs:
  run-etl-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pyarrow zoneinfo requests

      - name: Run Real-Time Raw Measurement Collection
        run: |
          python run_raw_measurement.py --measurement-label github_cron_live
        continue-on-error: true

      - name: Run ETL Data Generation
        run: |
          python generate_data.py
        continue-on-error: true

      - name: Export Public JSON Files
        run: |
          python export_json.py
        continue-on-error: true

      - name: Setup Node.js & Build Vite Dashboard
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install & Build Dashboard
        run: |
          cd dashboard
          npm install
          npm run build

      - name: Commit and Push Updated Data to GitHub
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "auto: continuous real-time traffic data update [skip ci]"
          file_pattern: "dashboard/public/*.json dashboard/dist/* outputs/*.parquet outputs/*.json outputs/raw_measurements/**"
