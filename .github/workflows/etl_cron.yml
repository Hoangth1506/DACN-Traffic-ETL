name: Automated Realtime Raw Traffic Extraction

on:
  schedule:
    - cron: '*/5 * * * *' # Automated trigger every 5 minutes (GitHub Actions minimum interval)
  workflow_dispatch: # Allows manual triggering from GitHub UI at any time

jobs:
  collect-raw-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pyarrow zoneinfo requests

      - name: Run Real-Time Raw Measurement Collection
        run: |
          python run_raw_measurement.py --measurement-label github_realtime_cron

      - name: Commit and Push New Raw Data to GitHub
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "auto: collect 10-node real-time raw measurement [skip ci]"
          file_pattern: "outputs/raw_measurements/**"
